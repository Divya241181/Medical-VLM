services:
  - type: web
    name: medvlm-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: MEDVLM_MODEL_VERSION
        value: 2.1.3
      - key: MEDVLM_INFERENCE_BACKEND
        value: proprietary
      - key: MEDVLM_MAX_BATCH_SIZE
        value: 1
      - key: MEDVLM_TIMEOUT_SECONDS
        value: 30
      - key: MEDVLM_LOG_LEVEL
        value: INFO
      - key: _INFERENCE_PROVIDER
        value: secure_api
      - key: _MODEL_REGISTRY
        value: production
    healthCheckPath: /health
