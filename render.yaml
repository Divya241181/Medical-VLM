services:
  - type: web
    name: medvlm-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    plan: free
    healthCheckPath: /health
    envVars:
      - key: GEMINI_API_KEY
        sync: false          # You must set this manually in Render dashboard
      - key: PYTHON_VERSION
        value: "3.11.0"
